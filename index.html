<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6f4ef" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111318" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="英语拆句">
  <meta name="description" content="English Sentence Lab is a mobile-first sentence learning PWA for grammar, listening, memory and output practice.">
  <title>English Sentence Lab</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <link rel="icon" href="./icons/icon.svg">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">English Sentence Lab</p>
        <h1>英语拆句</h1>
      </div>
      <button class="icon-button" id="themeToggle" type="button" aria-label="切换深浅色">
        <span id="themeIcon">◐</span>
      </button>
    </header>

    <main>
      <section class="hero-panel">
        <div>
          <p class="section-kicker">今日 10 句</p>
          <h2>用真实句子建立长期记忆</h2>
          <p class="muted">点击句子听整句，点击单词查词。收藏后进入复习调度，逐步完成听懂、理解、造句和真实输出。</p>
        </div>
        <div class="progress-card">
          <span>今日掌握</span>
          <strong id="todayMastery">0%</strong>
          <div class="progress-track"><i id="todayBar"></i></div>
        </div>
      </section>

      <nav class="tabs" aria-label="主要功能">
        <button class="tab active" data-view="home" type="button">首页</button>
        <button class="tab" data-view="review" type="button">复习</button>
        <button class="tab" data-view="sentences" type="button">句库</button>
        <button class="tab" data-view="words" type="button">单词</button>
      </nav>

      <section class="filters" id="homeFilters">
        <label>
          <span>场景</span>
          <select id="categoryFilter"></select>
        </label>
        <label>
          <span>难度</span>
          <select id="levelFilter"></select>
        </label>
      </section>

      <section id="homeView" class="view active">
        <div class="sentence-list" id="sentenceList"></div>
      </section>

      <section id="reviewView" class="view">
        <div class="panel">
          <div class="panel-head">
            <div>
              <p class="section-kicker">Spaced Repetition</p>
              <h2>今日复习</h2>
            </div>
            <span class="pill" id="reviewCount">0 条</span>
          </div>
          <div id="reviewList" class="review-list"></div>
        </div>
      </section>

      <section id="sentencesView" class="view">
        <div class="library-toolbar">
          <input id="sentenceSearch" type="search" placeholder="搜索我的句库">
        </div>
        <div id="savedSentences" class="sentence-list empty-wrap"></div>
      </section>

      <section id="wordsView" class="view">
        <div class="library-toolbar">
          <input id="wordSearch" type="search" placeholder="搜索我的单词库">
        </div>
        <div id="savedWords" class="word-grid empty-wrap"></div>
      </section>
    </main>

    <dialog id="wordDialog" class="sheet">
      <button class="sheet-close" id="closeWordDialog" type="button" aria-label="关闭">×</button>
      <div id="wordContent"></div>
    </dialog>

    <dialog id="aiDialog" class="sheet">
      <button class="sheet-close" id="closeAiDialog" type="button" aria-label="关闭">×</button>
      <div class="ai-box">
        <p class="section-kicker">问 AI</p>
        <h3 id="aiSentenceTitle"></h3>
        <textarea id="aiQuestion" placeholder="例如：为什么这里用 looking？"></textarea>
        <button class="primary-btn" id="askAiBtn" type="button">解释给我听</button>
        <div class="answer-box" id="aiAnswer"></div>
      </div>
    </dialog>

    <template id="sentenceTemplate">
      <article class="sentence-card">
        <div class="card-top">
          <span class="tag category"></span>
          <span class="tag level"></span>
          <button class="star-btn" type="button" aria-label="收藏句子">☆</button>
        </div>
        <button class="sentence-line" type="button"></button>
        <p class="translation"></p>
        <div class="mastery-row">
          <span class="mastery-label">掌握度 <b></b></span>
          <div class="progress-track"><i></i></div>
        </div>
        <div class="card-actions">
          <button class="ghost-btn grammar-btn" type="button">为什么这样说</button>
          <button class="ghost-btn ai-btn" type="button">问AI</button>
          <button class="ghost-btn review-btn" type="button">加入复习</button>
        </div>
        <div class="grammar-panel"></div>
      </article>
    </template>
  </div>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
